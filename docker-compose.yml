version: '3.8'

services:
  db:
    image: postgres:16
    container_name: lang-db
    environment:
      POSTGRES_DB: language_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d language_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: lang-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/language_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
    restart: on-failure

volumes:
  postgres_data: